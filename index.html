<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Listening journal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="lib/vis-9.1.2/vis-network.css">
    <style>
        :root {
            --toolbar-h: 48px;
            --context-strip-h: 36px;
            --legend-h: 56px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --toolbar-total-h: calc(var(--toolbar-h) + var(--safe-top));
        }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            background: #fff;
        }
        @supports (height: 100dvh) {
            html, body {
                min-height: 100dvh;
                height: 100dvh;
            }
        }
        @media (display-mode: standalone) {
            html, body {
                min-height: 100vh;
                height: 100vh;
            }
        }
        #mynetwork {
            position: absolute;
            top: var(--toolbar-total-h);
            left: 0;
            right: 0;
            bottom: calc(var(--legend-h) + var(--safe-bottom));
            background: #fff;
        }
        #listview {
            position: absolute;
            top: var(--toolbar-total-h);
            left: 0;
            right: 0;
            bottom: var(--safe-bottom);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 16px calc(12px + var(--safe-bottom));
            background: #fff;
            display: none;
        }
        #listview article {
            padding: 10px 0 12px;
            border-bottom: 1px solid #eee;
        }
        #listview article:last-child { border-bottom: none; }
        #listview .item-head {
            display: flex;
            gap: 10px;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        #listview .item-name { font-weight: 600; font-size: 15px; }
        #listview .item-name .heart {
            color: #4263B4;
            margin-right: 4px;
        }
        #listview .item-date {
            color: #888;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        #listview .item-notes {
            font-size: 14px;
            line-height: 1.45;
            color: #222;
            white-space: pre-wrap;
        }
        #listview .empty {
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 32px;
        }
        /* Design tokens — iOS system palette */
        :root {
            --ios-blue: #0A84FF;
            --ios-orange: #FF9500;
            --ios-red: #FF3B30;
            --hairline: rgba(0,0,0,.1);
            --tint-bg: rgba(10,132,255,.10);
            --seg-track: rgba(118,118,128,.12);
        }
        /* Top toolbar — translucent nav-bar */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--toolbar-total-h);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: var(--safe-top) 12px 0;
            box-sizing: border-box;
            background: rgba(249,249,249,.94);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--hairline);
            z-index: 10;
        }
        .toolbar-title {
            font-weight: 600;
            font-size: 15px;
            margin-right: auto;
        }
        /* Button system */
        .btn {
            height: 32px;
            padding: 0 12px;
            border: none;
            background: transparent;
            color: var(--ios-blue);
            font: 600 15px/1 inherit;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:active { background: var(--tint-bg); }
        .btn:disabled { opacity: .4; cursor: default; }
        .btn-primary {
            height: 34px;
            padding: 0 16px;
            border: none;
            background: var(--ios-blue);
            color: #fff;
            font: 600 15px/1 inherit;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn-primary:active { opacity: .85; }
        .btn-danger { color: var(--ios-red); }
        .btn-danger:active { background: rgba(255,59,48,.1); }
        .btn-icon {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--ios-blue);
            border-radius: 10px;
            cursor: pointer;
            padding: 0;
        }
        .btn-icon:active,
        .btn-icon[aria-pressed="true"] { background: var(--tint-bg); }
        .btn-icon svg.ic { width: 22px; height: 22px; display: block; }
        /* iOS segmented control */
        .segmented {
            display: inline-flex;
            padding: 2px;
            gap: 2px;
            height: 32px;
            background: var(--seg-track);
            border-radius: 9px;
        }
        .segmented .seg {
            border: none;
            background: transparent;
            color: #000;
            padding: 0 14px;
            font: 500 14px/1 inherit;
            border-radius: 7px;
            cursor: pointer;
        }
        .segmented .seg[aria-pressed="true"] {
            background: #fff;
            font-weight: 600;
            box-shadow: 0 3px 8px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.04);
        }
        /* Edit-mode action cluster */
        .edit-actions { display: inline-flex; gap: 2px; }
        .edit-actions.hidden { display: none; }
        /* Hint strip shown while add-edge mode is active */
        .hint-strip {
            position: fixed;
            top: var(--toolbar-total-h);
            left: 0; right: 0;
            height: 28px;
            background: var(--tint-bg);
            color: var(--ios-blue);
            font-size: 13px;
            font-weight: 500;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9;
        }
        .hint-strip.is-shown { display: flex; }
        .selection-strip {
            position: fixed;
            top: var(--toolbar-total-h);
            left: 0;
            right: 0;
            height: var(--context-strip-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 12px;
            background: rgba(255,255,255,.96);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--hairline);
            box-sizing: border-box;
            z-index: 9;
        }
        .selection-label {
            min-width: 0;
            color: #555;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .selection-actions {
            display: inline-flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .selection-actions .btn {
            height: 28px;
            padding: 0 10px;
            font-size: 13px;
        }
        .legend {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            min-height: var(--legend-h);
            padding: 6px 8px calc(6px + var(--safe-bottom));
            background: #fff;
            border-top: 1px solid #e3e3e3;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            z-index: 10;
        }
        .legend-item { display: flex; align-items: center; }
        .legend-color {
            display: inline-block;
            width: 12px; height: 12px;
            margin-right: 5px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,.15);
        }
        /* Info box for click-to-see-notes */
        #infoBox {
            position: fixed;
            top: calc(var(--toolbar-total-h) + var(--context-strip-h) + 8px);
            left: 8px;
            max-width: min(380px, calc(100vw - 16px));
            max-height: 40vh;
            overflow: auto;
            padding: 10px 12px;
            background: rgba(255,255,255,.96);
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            font-size: 13px;
            line-height: 1.35;
            display: none;
            z-index: 5;
        }
        #infoBox .close {
            float: right;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #888;
            margin-left: 8px;
        }
        /* Banner (unsaved changes). Sits above the legend. */
        #banner {
            position: fixed;
            bottom: calc(var(--legend-h) + var(--safe-bottom));
            left: 0; right: 0;
            padding: 10px 14px;
            background: rgba(255,149,0,.12);
            border-top: 1px solid rgba(255,149,0,.25);
            color: #8a4b00;
            font-size: 13px;
            font-weight: 500;
            display: none;
            z-index: 8;
            text-align: center;
        }
        #banner button {
            margin-left: 10px;
            height: 28px;
            padding: 0 10px;
            border: none;
            background: transparent;
            color: var(--ios-blue);
            font: 600 14px/1 inherit;
            border-radius: 6px;
            cursor: pointer;
        }
        #banner button:active { background: var(--tint-bg); }
        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #fff;
            border-radius: 10px;
            width: min(460px, calc(100vw - 24px));
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            padding: 16px;
        }
        .modal h2 { margin: 0 0 10px; font-size: 17px; }
        .modal label { display: block; font-size: 13px; margin-top: 10px; color: #444; }
        .modal input[type="text"],
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .row { display: flex; gap: 12px; align-items: center; margin-top: 10px; font-size: 14px; }
        .modal .row label { margin: 0; display: flex; align-items: center; gap: 6px; }
        .modal-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .modal-actions button {
            height: 36px;
            padding: 0 14px;
            border: none;
            background: transparent;
            color: var(--ios-blue);
            font: 600 15px/1 inherit;
            border-radius: 8px;
            cursor: pointer;
        }
        .modal-actions button:active { background: var(--tint-bg); }
        .modal-actions button.primary {
            background: var(--ios-blue);
            color: #fff;
            border-radius: 10px;
        }
        .modal-actions button.primary:active {
            opacity: .85;
            background: var(--ios-blue);
        }
        .modal-actions button.danger {
            color: var(--ios-red);
            margin-right: auto;
        }
        .modal-actions button.danger:active { background: rgba(255,59,48,.1); }
        /* On narrow screens, make modal a bottom-sheet */
        @media (max-width: 540px) {
            .modal-backdrop { align-items: flex-end; }
            .modal {
                width: 100%;
                border-radius: 14px 14px 0 0;
                max-height: 85vh;
                padding-bottom: calc(16px + var(--safe-bottom));
            }
        }
        /* Hide vis.js's built-in manipulation UI; we drive it via our own buttons. */
        div.vis-manipulation,
        div.vis-edit-mode { display: none !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <svg width="0" height="0" aria-hidden="true" style="position:absolute"><defs>
        <symbol id="ic-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/>
            <path d="M18.5 2.5a2.12 2.12 0 1 1 3 3L12 15l-4 1 1-4z"/>
        </symbol>
        <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8"/>
            <path d="M12 8v8"/>
        </symbol>
        <symbol id="ic-edge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="18" r="2.4"/>
            <circle cx="18" cy="6" r="2.4"/>
            <line x1="8" y1="16" x2="16" y2="8"/>
        </symbol>
        <symbol id="ic-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <path d="M17 8l-5-5-5 5"/>
            <path d="M12 3v12"/>
        </symbol>
        <symbol id="ic-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M12 15V3"/>
        </symbol>
        <symbol id="ic-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 14.9A7 7 0 1 1 15.7 8h1.8a4.5 4.5 0 0 1 2.5 8.24"/>
            <path d="M12 12v9"/>
            <path d="M16 16l-4-4-4 4"/>
        </symbol>
    </defs></svg>

    <header class="toolbar">
        <span class="toolbar-title">Listening journal</span>
        <div class="segmented" id="viewToggle" role="tablist" aria-label="View">
            <button id="btnViewGraph" class="seg" aria-pressed="true">Graph</button>
            <button id="btnViewList"  class="seg" aria-pressed="false">List</button>
        </div>
        <div class="edit-actions hidden" id="editActions">
            <button class="btn-icon" id="btnAddNode" aria-label="Add node"><svg class="ic"><use href="#ic-plus"/></svg></button>
            <button class="btn-icon" id="btnAddEdge" aria-label="Add edge" aria-pressed="false"><svg class="ic"><use href="#ic-edge"/></svg></button>
            <button class="btn-icon" id="btnExport"  aria-label="Export CSV"><svg class="ic"><use href="#ic-up"/></svg></button>
            <button class="btn-icon" id="btnImport"  aria-label="Import CSV"><svg class="ic"><use href="#ic-down"/></svg></button>
            <button class="btn-icon hidden" id="btnSave" aria-label="Save to GitHub"><svg class="ic"><use href="#ic-cloud"/></svg></button>
        </div>
        <button class="btn-icon" id="btnMode" aria-label="Edit" aria-pressed="false"><svg class="ic"><use href="#ic-edit"/></svg></button>
        <input type="file" id="importFile" accept=".csv,text/csv" hidden>
    </header>

    <div class="hint-strip" id="hintStrip">Drag from one node to another</div>
    <div class="selection-strip hidden" id="selectionStrip">
        <div class="selection-label" id="selectionLabel"></div>
        <div class="selection-actions">
            <button class="btn" id="btnEditSelection">Edit</button>
            <button class="btn btn-danger" id="btnDeleteSelection">Delete</button>
        </div>
    </div>

    <div id="banner"></div>
    <div id="mynetwork"></div>
    <div id="listview"></div>
    <div id="infoBox"><span class="close" id="infoBoxClose">×</span><div id="infoBoxContent"></div></div>

    <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background:#6495ED"></span>Album</div>
        <div class="legend-item"><span class="legend-color" style="background:#4263B4"></span>Favourite album</div>
        <div class="legend-item"><span class="legend-color" style="background:AliceBlue"></span>Album to listen</div>
        <div class="legend-item"><span class="legend-color" style="background:SandyBrown"></span>Artist</div>
        <div class="legend-item"><span class="legend-color" style="background:DarkOrange"></span>Favourite artist</div>
    </div>

    <!-- Node / edge edit modal -->
    <div class="modal-backdrop" id="modal">
        <div class="modal" role="dialog" aria-modal="true">
            <h2 id="modalTitle">Edit</h2>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="danger hidden" id="modalDelete">Delete</button>
                <button id="modalCancel">Cancel</button>
                <button class="primary" id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <script src="lib/vis-9.1.2/vis-network.min.js"></script>
    <script src="lib/bindings/utils.js"></script>
    <script src="app.js"></script>
</body>
</html>

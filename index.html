<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Listening journal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="lib/vis-9.1.2/vis-network.css">
    <style>
        :root {
            --toolbar-h: 48px;
            --legend-h: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            background: #fff;
        }
        #mynetwork {
            position: absolute;
            top: var(--toolbar-h);
            left: 0;
            right: 0;
            bottom: calc(var(--legend-h) + var(--safe-bottom));
            background: #fff;
        }
        #toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--toolbar-h);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            background: #fafafa;
            border-bottom: 1px solid #e3e3e3;
            z-index: 10;
        }
        #toolbar .title {
            font-weight: 600;
            margin-right: auto;
            font-size: 15px;
        }
        #toolbar button, #toolbar label.btn {
            min-height: 36px;
            min-width: 36px;
            padding: 0 12px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        #toolbar button[aria-pressed="true"] {
            background: #2d6cdf;
            color: #fff;
            border-color: #2d6cdf;
        }
        #toolbar button:disabled { opacity: .5; cursor: default; }
        .legend {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            min-height: var(--legend-h);
            padding: 6px 8px calc(6px + var(--safe-bottom));
            background: #fff;
            border-top: 1px solid #e3e3e3;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            z-index: 10;
        }
        .legend-item { display: flex; align-items: center; }
        .legend-color {
            display: inline-block;
            width: 12px; height: 12px;
            margin-right: 5px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,.15);
        }
        /* Info box for click-to-see-notes */
        #infoBox {
            position: fixed;
            top: calc(var(--toolbar-h) + 8px);
            left: 8px;
            max-width: min(380px, calc(100vw - 16px));
            max-height: 40vh;
            overflow: auto;
            padding: 10px 12px;
            background: rgba(255,255,255,.96);
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            font-size: 13px;
            line-height: 1.35;
            display: none;
            z-index: 5;
        }
        #infoBox .close {
            float: right;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #888;
            margin-left: 8px;
        }
        /* Banner (unsaved changes / source indicator) */
        #banner {
            position: fixed;
            top: var(--toolbar-h);
            left: 0; right: 0;
            padding: 6px 10px;
            background: #fff6d1;
            border-bottom: 1px solid #e6d56b;
            font-size: 13px;
            display: none;
            z-index: 8;
        }
        #banner button {
            margin-left: 8px;
            padding: 4px 10px;
            border: 1px solid #b89c29;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
        }
        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #fff;
            border-radius: 10px;
            width: min(460px, calc(100vw - 24px));
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            padding: 16px;
        }
        .modal h2 { margin: 0 0 10px; font-size: 17px; }
        .modal label { display: block; font-size: 13px; margin-top: 10px; color: #444; }
        .modal input[type="text"],
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .row { display: flex; gap: 12px; align-items: center; margin-top: 10px; font-size: 14px; }
        .modal .row label { margin: 0; display: flex; align-items: center; gap: 6px; }
        .modal-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .modal-actions button {
            min-height: 40px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-actions button.primary {
            background: #2d6cdf; color: #fff; border-color: #2d6cdf;
        }
        .modal-actions button.danger {
            background: #c0392b; color: #fff; border-color: #c0392b;
            margin-right: auto;
        }
        /* On narrow screens, make modal a bottom-sheet */
        @media (max-width: 540px) {
            .modal-backdrop { align-items: flex-end; }
            .modal {
                width: 100%;
                border-radius: 14px 14px 0 0;
                max-height: 85vh;
                padding-bottom: calc(16px + var(--safe-bottom));
            }
        }
        /* vis.js manipulation panel — make buttons bigger on touch */
        div.vis-manipulation {
            border-top: none !important;
            background: #fafafa !important;
        }
        div.vis-manipulation .vis-button {
            min-height: 36px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">Listening journal</span>
        <button id="btnMode" aria-pressed="false" title="Toggle edit mode">Edit</button>
        <button id="btnSave" class="hidden" title="Commit to GitHub">Save</button>
        <button id="btnExport" class="hidden" title="Download data.csv">Export</button>
        <label class="btn hidden" id="btnImportLabel" for="importFile" title="Load a data.csv">Import</label>
        <input type="file" id="importFile" accept=".csv,text/csv" style="display:none">
    </div>

    <div id="banner"></div>
    <div id="mynetwork"></div>
    <div id="infoBox"><span class="close" id="infoBoxClose">×</span><div id="infoBoxContent"></div></div>

    <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background:#6495ED"></span>Album</div>
        <div class="legend-item"><span class="legend-color" style="background:#4263B4"></span>Favourite album</div>
        <div class="legend-item"><span class="legend-color" style="background:AliceBlue"></span>Album to listen</div>
        <div class="legend-item"><span class="legend-color" style="background:SandyBrown"></span>Artist</div>
        <div class="legend-item"><span class="legend-color" style="background:DarkOrange"></span>Favourite artist</div>
    </div>

    <!-- Node / edge edit modal -->
    <div class="modal-backdrop" id="modal">
        <div class="modal" role="dialog" aria-modal="true">
            <h2 id="modalTitle">Edit</h2>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="danger hidden" id="modalDelete">Delete</button>
                <button id="modalCancel">Cancel</button>
                <button class="primary" id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <script src="lib/vis-9.1.2/vis-network.min.js"></script>
    <script src="lib/bindings/utils.js"></script>
    <script src="app.js"></script>
</body>
</html>

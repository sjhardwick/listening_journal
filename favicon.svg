<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- RYM-ish beige backdrop -->
  <rect width="32" height="32" fill="#eadcb8"/>

  <!-- vinyl record -->
  <circle cx="15" cy="18" r="11" fill="#141414"/>
  <circle cx="15" cy="18" r="9"  fill="none" stroke="#3a3a3a" stroke-width="0.6"/>
  <circle cx="15" cy="18" r="7"  fill="none" stroke="#3a3a3a" stroke-width="0.6"/>

  <!-- label (album-blue from the journal) -->
  <circle cx="15" cy="18" r="4.5" fill="#6495ED"/>
  <circle cx="15" cy="18" r="0.8" fill="#eadcb8"/>

  <!-- connection motif: a single node wired off to the corner, nodding to the graph -->
  <line x1="22.2" y1="10.5" x2="26" y2="6" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="26" cy="6" r="3" fill="#FF8C00" stroke="#2a2a2a" stroke-width="0.8"/>
</svg>
